name: Update Kindle Screensaver

on:
  push:
    branches:
      - master
      - main
  schedule:
    # Run at the top of every hour
    - cron: '0 * * * *'
  # Allow manual testing from GitHub UI
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install Pillow requests

      - name: Fetch and Process Image
        run: python scripts/update_photo.py

      - name: Deploy to Screensaver Branch
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create an orphan branch specifically for the image to keep history clean
          git checkout --orphan screensaver-deploy
          
          # Clear all files from git index, then add just the screensaver
          git rm -rf .
          git add screensaver.png
          
          # Commit and force push
          git commit -m "Update screensaver image - $(date)" || echo "No changes to commit"
          git push -f origin screensaver-deploy
