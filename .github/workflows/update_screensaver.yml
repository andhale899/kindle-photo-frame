name: Update Kindle Screensaver

on:
  push:
    branches:
      - master
      - main
  schedule:
    # Run at the top of every hour
    - cron: '0 * * * *'
  # Allow manual testing from GitHub UI
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install Pillow requests icalendar python-dateutil

      - name: Fetch and Process Images
        run: python scripts/update_photo.py

      - name: Deploy to Screensaver Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use an orphan branch to keep only the latest images and avoid bloating the repo
          git checkout --orphan screensaver-deploy
          git rm -rf .
          
          # Add all generated screensaver images
          git add bg_ss*.png
          
          git commit -m "Update screensaver images - $(date)" || echo "No changes to commit"
          git push -f origin screensaver-deploy
